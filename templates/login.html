<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediGen-AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0d9488; --teal-dark: #0f766e; --teal-light: #99f6e4;
            --navy: #0f172a; --slate: #1e293b; --white: #f8fafc; --accent: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
    font-family: 'DM Sans', sans-serif;
    background:
        linear-gradient(rgba(15,23,42,0.55),
        rgba(15,23,42,0.55)),
        url('https://images.unsplash.com/photo-1584982751601-97dcc096659c?q=80&w=2070&auto=format&fit=crop');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(13,148,136,0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        .container {
            width: 100%;
            max-width: 460px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
.back-link,
.forgot-link{
    padding:0.55rem 0.9rem;
    border-radius:12px;
    background:rgba(13,148,136,0.16);
    border:1px solid rgba(153,246,228,0.22);
    color:#99f6e4;
    text-decoration:none;
    font-size:0.82rem;
    font-weight:600;
    backdrop-filter:blur(10px);
    transition:all 0.25s ease;
}
      .back-link:hover,
.forgot-link:hover{
    background:rgba(13,148,136,0.28);
    color:white;
    transform:translateY(-2px);
    box-shadow:0 0 18px rgba(13,148,136,0.22);
}
.bottom-links{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:1rem;
    margin-top:1.4rem;
}
.card {
    background: rgba(15,23,42,0.88);

    border: 1px solid rgba(255,255,255,0.10);

    border-radius: 24px;

    padding: 2.5rem;

    backdrop-filter: blur(18px);

    -webkit-backdrop-filter: blur(18px);

    box-shadow:
        0 0 25px rgba(0,0,0,0.35),
        0 0 60px rgba(13,148,136,0.10);
}
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--teal-light);
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .logo span { color: var(--accent); }
        .subtitle {
            text-align: center;
            color: rgba(248,250,252,0.4);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        /* Role selector */
        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
        }
        .role-tab {
            padding: 0.7rem;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.08);
            background: transparent;
            color: rgba(248,250,252,0.5);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }
        .role-tab:hover { border-color: var(--teal); color: var(--white); }
        .role-tab.active {
            border-color: #0f766e;
            background: rgba(13,148,136,0.15);
            color: #0f766e;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: rgba(248,250,252,0.7); margin-bottom: 0.4rem; }
        input, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--teal); }
        select option { background: var(--slate); }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: var(--teal-dark); transform: translateY(-1px); }
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
        }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
        .demo-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 12px;
            font-size: 0.82rem;
            color: rgba(248,250,252,0.6);
        }
        .demo-info strong { color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    
    
    <div class="card">
        <div class="logo">🏥 MediGen<span>-AI</span></div>
        <p class="subtitle">Sign in to your account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <div class="role-tabs">
            <button class="role-tab" onclick="selectRole('admin')" id="tab-admin">🛡️ Admin</button>
            <button class="role-tab" onclick="selectRole('doctor')" id="tab-doctor">👨‍⚕️ Doctor</button>
            <button class="role-tab" onclick="selectRole('staff')" id="tab-staff">👩‍💼 OPD Staff</button>
            <button class="role-tab" onclick="selectRole('patient')" id="tab-patient">🤒 Patient</button>
        </div>

        <form method="POST" action="/login">
            <input type="hidden" name="role" id="role-input" value="admin">
            
            <div class="form-group">
                <label>Login ID</label>
                <input type="text" name="login_id" placeholder="Enter your Login ID" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>
        <div class="bottom-links">
    <a href="/" class="back-link">
        ← Back to Home
    </a>
    <a href="/forgot-password" class="forgot-link">
        🔓 Forgot Password?
    </a>
</div>
    </div>
</div>

<script>
    function selectRole(role) {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + role).classList.add('active');
        document.getElementById('role-input').value = role;
    }
    
    // Auto-select from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role') || 'admin';
    selectRole(role);
</script>
</body>
</html>
