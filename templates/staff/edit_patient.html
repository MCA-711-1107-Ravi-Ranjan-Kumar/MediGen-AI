{% extends 'base.html' %}

{% block title %}Edit Patient{% endblock %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}

<style>

.edit-container{
    max-width:900px;
    margin:auto;
    background:#111827;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    color:#99f6e4;
    font-weight:600;
}

.form-group input{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:15px;
}

.update-btn{
    margin-top:30px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#14b8a6;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.update-btn:hover{
    background:#0f766e;
}
.back-btn{
    display:block;
    margin-top:15px;
    text-align:center;
    padding:12px;
    border-radius:10px;
    background:#41c0cb;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.back-btn:hover{
    background:#1f2937;
}



</style>

<div class="edit-container">

    <h2 style="color:white;margin-bottom:25px;">
        ✏️ Edit Patient
    </h2>

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Patient Name</label>
                <input type="text"
                       name="name"
                       value="{{ patient.name }}">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <input type="text"
                       name="gender"
                       value="{{ patient.gender }}">
            </div>
          <div class="form-group">
                <label>Age</label>
                <input type="text"
                       name="age"
                       value="{{ patient.age }}">
            </div>

            <div class="form-group">
                <label>Weight</label>
                <input type="text"
                       name="weight"
                       value="{{ patient.weight }}">
            </div>   


            <div class="form-group">
                <label>Mobile</label>
                <input type="text"
                       name="mobile"
                       value="{{ patient.mobile }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="text"
                       name="email"
                       value="{{ patient.email }}">
            </div>

            <div class="form-group">
                <label>ABHA Address</label>
                <input type="text"
                       name="abha_address"
                       value="{{ patient.abha_address }}">
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text"
                       name="address"
                       value="{{ patient.address }}">
            </div>
        </div>

        <button type="submit" class="update-btn">
            Update Patient
        </button>
      <a href="/staff" class="back-btn"> ← Back to Dashboard</a>


    </form>

</div>

{% endblock %}
